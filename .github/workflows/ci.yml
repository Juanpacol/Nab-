name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # La versión de pnpm se toma del campo "packageManager" de package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente Prisma
        run: pnpm --filter @nab/database generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    name: Build imágenes Docker
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        service: [api, web, workers]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publica api/workers en GHCR al mergear a main. La web NO se publica aquí:
  # se despliega aparte en Vercel (deploy automático propio al hacer push).
  publish:
    name: Publicar imágenes en GHCR
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, workers]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR exige nombres de repositorio en minúsculas; github.repository_owner
      # conserva las mayúsculas del usuario/org (p.ej. "Juanpacol").
      - name: Normalizar owner a minúsculas
        id: owner
        run: echo "lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build y push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lower }}/nab-${{ matrix.service }}:latest
            ghcr.io/${{ steps.owner.outputs.lower }}/nab-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Despliega en el VPS por SSH. Se salta silenciosamente hasta que el VPS
  # exista y estos secrets estén configurados en el repo (Settings → Secrets):
  # SSH_HOST, SSH_USER, SSH_KEY. Ver docs/DEPLOY.md.
  deploy:
    name: Desplegar en el VPS
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Backup + pull + migrar + reiniciar
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/nab
            GHCR_IMAGE_TAG=sha-${{ github.sha }} ./scripts/deploy.sh
