# Aplicación completa lista para consumir: web + api + workers + postgres + redis.
#   docker compose up --build
# Requiere un archivo .env (ver .env.example).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nab
      POSTGRES_PASSWORD: nab
      POSTGRES_DB: nab
    volumes:
      - nab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nab']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Aplica migraciones y siembra datos; luego termina.
  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: sh -c "pnpm --filter @nab/database migrate && pnpm --filter @nab/database seed"
    environment:
      DATABASE_URL: postgresql://nab:nab@postgres:5432/nab?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://nab:nab@postgres:5432/nab?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  workers:
    build:
      context: .
      dockerfile: docker/workers.Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nab:nab@postgres:5432/nab?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  nab_pgdata:
